<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
</head>
<body>
    
    <div class="calc-container">
        <div class="calc-row">
            <input type="text" class="display-val" disabled placeholder="0">
        </div>
        <div class="calc-row">
            <button class="btn">C</button>
            <button class="btn">±</button>
            <button class="btn percent">%</button>
            <button class="btn op">÷</button>
        </div>
        <div class="calc-row">
            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn op">×</button>
        </div>
        <div class="calc-row">
            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn op">-</button>
        </div>
        <div class="calc-row">
            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn op">+</button>
        </div>
        <div class="calc-row">
            <button class="btn zero">0</button>
            <button class="btn dot">.</button>
            <button class="btn equal op">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
