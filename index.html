<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
</head>

<body>

    <div class="grid-bg"></div>

    <div class="calc-wrap">
        <p class="label">Calculator</p>
        <div class="calc">
            <div class="display">
                <div class="display-expr" id="expr"></div>
                <div class="display-val" id="val">0</div>
            </div>
            <div class="grid">
                <button class="btn fn" data-action="ac">AC</button>
                <button class="btn fn" data-action="sign">+/−</button>
                <button class="btn fn" data-action="pct">%</button>
                <button class="btn op" data-action="op" data-op="÷">÷</button>

                <button class="btn" data-action="num" data-num="7">7</button>
                <button class="btn" data-action="num" data-num="8">8</button>
                <button class="btn" data-action="num" data-num="9">9</button>
                <button class="btn op" data-action="op" data-op="×">×</button>

                <button class="btn" data-action="num" data-num="4">4</button>
                <button class="btn" data-action="num" data-num="5">5</button>
                <button class="btn" data-action="num" data-num="6">6</button>
                <button class="btn op" data-action="op" data-op="−">−</button>

                <button class="btn" data-action="num" data-num="1">1</button>
                <button class="btn" data-action="num" data-num="2">2</button>
                <button class="btn" data-action="num" data-num="3">3</button>
                <button class="btn op" data-action="op" data-op="+">+</button>

                <button class="btn span2" data-action="num" data-num="0">0</button>
                <button class="btn" data-action="dot">.</button>
                <button class="btn eq" data-action="eq">=</button>
            </div>
        </div>
        <p class="hint">Keyboard supported &nbsp;·&nbsp; Enter = &nbsp;·&nbsp; Esc = AC</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
